<!DOCTYPE html>
<html lang=en>
    <head>
        <title>A-Frame scene</title>
        <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
            
            
<!--
    Change the rotation for each of these shapes. 
    You do not need to modify any other attributes.
    
    <hint> 90 and 45 are good numbers to use. </hint>
-->
  
</html> <a-cylinder 
        position="0 1 -4.2"
        color="red"
        rotation="0 0 0"
        scale="2 0.5 1"
    ></a-cylinder>
  
    <a-box 
        position="0.5 2 -6"
        color="green"
        rotation="0 0 0"
       scale="0.3 0.3 1000"
    
    ></a-box>
    
    <a-box 
        position="-2 3 -7"
        color="orange"
        scale="1 3 1"
        ></a-box>
    
    <!-- 
        you might not get the exact rotation for the torus,
        just make it look close enough.
    -->
    <a-torus 
        position="0 1.8 -0.8"
        color="blue"
        ></a-torus>
    
        </a-scene>
    </body>
</html>
